<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: bold; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .label { font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0d3a42; }
      .hex { font-size: 12px; font-family: monospace; font-weight: 500; fill: #0d3a42; }
      .sample-label { font-size: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #666; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="30" y="40" class="title">Border Color Options (monochromatic teal palette)</text>

  <!-- Other palette colors (reference) -->
  <text x="30" y="90" class="label" font-weight="bold">Reference Colors:</text>

  <!-- Base -->
  <rect x="30" y="110" width="60" height="60" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <text x="30" y="185" class="hex">#ffffff</text>
  <text x="30" y="200" class="label">Base</text>

  <!-- Accent -->
  <rect x="110" y="110" width="60" height="60" fill="#40baec" stroke="#ddd" stroke-width="1"/>
  <text x="110" y="185" class="hex">#40baec</text>
  <text x="105" y="200" class="label">Accent</text>

  <!-- Card BG -->
  <rect x="190" y="110" width="60" height="60" fill="#d4eff9" stroke="#ddd" stroke-width="1"/>
  <text x="190" y="185" class="hex">#d4eff9</text>
  <text x="185" y="200" class="label">Card BG</text>

  <!-- Text -->
  <rect x="270" y="110" width="60" height="60" fill="#0d3a42" stroke="#ddd" stroke-width="1"/>
  <text x="270" y="185" class="hex">#0d3a42</text>
  <text x="270" y="200" class="label">Text</text>

  <!-- Border Color Options Title -->
  <text x="30" y="260" class="label" font-weight="bold">Border Color Options:</text>

  <!-- OPTION 1: #167b99 -->
  <g>
    <text x="30" y="305" class="label" font-weight="bold">Option 1: More Blue-Cyan</text>
    <rect x="30" y="320" width="80" height="80" fill="#ffffff" stroke="#167b99" stroke-width="2"/>
    <text x="30" y="415" class="hex">#167b99</text>
    
    <!-- Sample card with this border -->
    <rect x="130" y="320" width="140" height="80" fill="#ffffff" stroke="#167b99" stroke-width="2" rx="2"/>
    <rect x="130" y="320" width="140" height="30" fill="#167b99"/>
    <text x="140" y="340" class="label" fill="#ffffff">Sample Card</text>
    <text x="140" y="365" class="sample-label" fill="#0d3a42">Slightly deeper,</text>
    <text x="140" y="380" class="sample-label" fill="#0d3a42">more blue-shifted</text>
  </g>

  <!-- OPTION 2: #0f7a96 -->
  <g>
    <text x="320" y="305" class="label" font-weight="bold">Option 2: Rich Blue-Teal</text>
    <rect x="320" y="320" width="80" height="80" fill="#ffffff" stroke="#0f7a96" stroke-width="2"/>
    <text x="320" y="415" class="hex">#0f7a96</text>
    
    <!-- Sample card with this border -->
    <rect x="420" y="320" width="140" height="80" fill="#ffffff" stroke="#0f7a96" stroke-width="2" rx="2"/>
    <rect x="420" y="320" width="140" height="30" fill="#0f7a96"/>
    <text x="430" y="340" class="label" fill="#ffffff">Sample Card</text>
    <text x="430" y="365" class="sample-label" fill="#0d3a42">Deeper blue inflection,</text>
    <text x="430" y="380" class="sample-label" fill="#0d3a42">more saturated</text>
  </g>

  <!-- OPTION 3: #1a8099 -->
  <g>
    <text x="610" y="305" class="label" font-weight="bold">Option 3: Balanced Cyan-Blue</text>
    <rect x="610" y="320" width="80" height="80" fill="#ffffff" stroke="#1a8099" stroke-width="2"/>
    <text x="610" y="415" class="hex">#1a8099</text>
    
    <!-- Sample card with this border -->
    <rect x="710" y="320" width="140" height="80" fill="#ffffff" stroke="#1a8099" stroke-width="2" rx="2"/>
    <rect x="710" y="320" width="140" height="30" fill="#1a8099"/>
    <text x="720" y="340" class="label" fill="#ffffff">Sample Card</text>
    <text x="720" y="365" class="sample-label" fill="#0d3a42">Pure blue-teal,</text>
    <text x="720" y="380" class="sample-label" fill="#0d3a42">slightly lighter</text>
  </g>

  <!-- OPTION 4: #1a6f8a -->
  <g>
    <text x="900" y="305" class="label" font-weight="bold">Option 4: Deep Teal (Most Blue)</text>
    <rect x="900" y="320" width="80" height="80" fill="#ffffff" stroke="#1a6f8a" stroke-width="2"/>
    <text x="900" y="415" class="hex">#1a6f8a</text>
    
    <!-- Sample card with this border -->
    <rect x="1000" y="320" width="140" height="80" fill="#ffffff" stroke="#1a6f8a" stroke-width="2" rx="2"/>
    <rect x="1000" y="320" width="140" height="30" fill="#1a6f8a"/>
    <text x="1010" y="340" class="label" fill="#ffffff">Sample Card</text>
    <text x="1010" y="365" class="sample-label" fill="#0d3a42">Most blue-heavy,</text>
    <text x="1010" y="380" class="sample-label" fill="#0d3a42">stronger contrast</text>
  </g>

  <!-- Current color (for reference) -->
  <g>
    <text x="30" y="540" class="label" font-weight="bold">Current: #1b8fa3 (too green)</text>
    <rect x="30" y="560" width="80" height="80" fill="#ffffff" stroke="#1b8fa3" stroke-width="2"/>
    <text x="30" y="655" class="hex">#1b8fa3</text>
  </g>

  <!-- Notes -->
  <text x="30" y="750" class="sample-label" font-weight="bold">All options maintain the monochromatic teal aesthetic. Choose the one that feels most blue/cyan without losing sophistication.</text>
</svg>